<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beuna OS - Dev Engine</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/sunsetdansenja-arch/beuna-agency/main/beuna%20logo%20v2.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;900&family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #f4f4f0; color: #000; overflow-x: hidden; min-height: 100vh; }
        .font-mono { font-family: 'Fira Code', monospace; }
        .neo-border { border: 3px solid #000; }
        .neo-card { background-color: #fff; border: 3px solid #000; box-shadow: 6px 6px 0px 0px #000; border-radius: 8px; }
        .neo-btn { border: 3px solid #000; box-shadow: 4px 4px 0px 0px #000; border-radius: 8px; font-weight: 700; cursor: pointer; transition: all 0.15s ease; display: inline-flex; align-items: center; justify-content: center; }
        .neo-btn:hover { transform: translate(2px, 2px); box-shadow: 2px 2px 0px 0px #000; }
        .neo-input { border: 3px solid #000; box-shadow: 2px 2px 0px 0px #000; border-radius: 6px; padding: 0.75rem 1rem; width: 100%; outline: none; font-weight: 600; background: white; cursor: pointer; }
        .neo-input:focus { background-color: #bbf7d0; }
        
        /* Kalender Neo-Brutalism Styling */
        input[type="date"]::-webkit-calendar-picker-indicator {
            background-color: #4ade80;
            padding: 5px;
            cursor: pointer;
            border: 2px solid #000;
            border-radius: 4px;
            box-shadow: 2px 2px 0px #000;
        }
        
        .custom-scroll::-webkit-scrollbar { width: 8px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f4f4f0; border-left: 2px solid #000; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #000; }
        .loader { border-top-color: #000; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="antialiased flex h-screen overflow-hidden selection:bg-[#4ade80] selection:text-black">

    <aside class="w-20 md:w-64 bg-white neo-border border-l-0 border-t-0 border-b-0 flex flex-col z-20">
        <div class="p-6 flex items-center gap-3 border-b-[3px] border-black bg-black text-white">
            <img src="https://raw.githubusercontent.com/sunsetdansenja-arch/beuna-agency/main/beuna%20logo%20v2.png" class="w-10 h-10 object-contain filter invert">
            <span class="font-black hidden md:block text-2xl uppercase tracking-widest">Engine.</span>
        </div>
        <nav class="flex-1 p-4 space-y-4 mt-2">
            <a href="crm.html" id="nav-crm" class="w-full neo-btn bg-white px-4 py-3 text-sm flex gap-3 text-black hover:bg-gray-100">
                <i class="ph-bold ph-funnel text-xl"></i> <span class="hidden md:block">CRM Hub</span>
            </a>
            <a href="docs.html" id="nav-docs" class="w-full neo-btn bg-white px-4 py-3 text-sm flex gap-3 text-black hover:bg-gray-100">
                <i class="ph-bold ph-files text-xl"></i> <span class="hidden md:block">Docs Center</span>
            </a>
            <a href="developer.html" id="nav-dev" class="w-full neo-btn bg-[#4ade80] px-4 py-3 text-sm flex gap-3 text-black">
                <i class="ph-bold ph-terminal-window text-xl"></i> <span class="hidden md:block">Dev Engine</span>
            </a>
        </nav>
        <div class="p-4 bg-[#f4f4f0] border-t-[3px] border-black">
            <div class="mb-4 hidden md:block">
                <p class="text-[10px] font-black uppercase text-gray-500">Logged in as:</p>
                <p class="text-sm font-black truncate" id="devName">Developer</p>
            </div>
            <button onclick="logout()" class="w-full neo-btn bg-[#fca5a5] text-black px-4 py-3 text-xs flex gap-2">
                <i class="ph-bold ph-power text-lg"></i> <span class="hidden md:block">System Logout</span>
            </button>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto relative custom-scroll p-6 md:p-10">
        <div id="loadingOverlay" class="absolute inset-0 bg-[#f4f4f0]/90 backdrop-blur-sm z-50 flex flex-col items-center justify-center hidden">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-black h-16 w-16 mb-4"></div>
            <p class="text-sm font-mono font-black uppercase tracking-widest bg-[#4ade80] border-[3px] border-black px-4 py-1">FETCHING REPO...</p>
        </div>

        <div class="max-w-[1400px] mx-auto space-y-6">
            <div class="neo-card bg-black text-white p-8 flex justify-between items-center">
                <div>
                    <h1 class="text-3xl font-black uppercase text-[#4ade80] mb-1">Developer Console</h1>
                    <p class="text-xs font-mono text-gray-400">Push perbaikan. Generate log BAP otomatis.</p>
                </div>
                <div class="text-right hidden md:block">
                    <p class="text-4xl font-black text-white" id="statActive">0</p>
                    <p class="text-[10px] font-bold uppercase tracking-widest text-[#4ade80]">Active Projects</p>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-1 space-y-6">
                    <div class="neo-card p-6 bg-[#bbf7d0]">
                        <h2 class="text-lg font-black uppercase mb-4 flex items-center gap-2 border-b-[3px] border-black pb-2">
                            <i class="ph-bold ph-plus-square"></i> Push Dev Log
                        </h2>
                        <form onsubmit="submitDevLog(event)" class="space-y-4">
                            
                            <div>
                                <label class="block text-[10px] font-black uppercase mb-1">Tanggal Eksekusi</label>
                                <input type="date" id="logDate" required class="neo-input font-mono text-sm tracking-widest uppercase">
                            </div>

                            <div>
                                <label class="block text-[10px] font-black uppercase mb-1">Pilih Proyek</label>
                                <select id="logProject" required class="neo-input cursor-pointer">
                                    <option value="" disabled selected>Memuat data proyek...</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-[10px] font-black uppercase mb-1">Kategori Perbaikan</label>
                                <select id="logCategory" required class="neo-input cursor-pointer">
                                    <option value="Bug Fix">Bug Fix (Perbaikan Error)</option>
                                    <option value="Feature Update">Feature Update (Fitur Baru)</option>
                                    <option value="Database">Database (N8N/Backend)</option>
                                    <option value="Maintenance">Maintenance Rutin</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-[10px] font-black uppercase mb-1">Detail Eksekusi (Masuk ke BAP)</label>
                                <textarea id="logDetail" required rows="3" class="neo-input text-xs leading-relaxed" placeholder="Contoh: Memperbaiki logic N8N pada form leads..."></textarea>
                            </div>
                            <button type="submit" id="btnSubmitLog" class="w-full neo-btn bg-black text-[#4ade80] py-4 text-sm font-mono uppercase tracking-widest hover:bg-gray-800">
                                Push to N8N Database
                            </button>
                        </form>
                    </div>
                </div>

                <div class="lg:col-span-2 space-y-6">
                    <div class="neo-card bg-white p-6 h-64 flex flex-col">
                        <h3 class="text-sm font-black uppercase tracking-widest mb-4 border-b-3 border-black pb-2 flex items-center gap-2">
                            <i class="ph-bold ph-rocket-launch"></i> Proyek Berjalan (Development)
                        </h3>
                        <div id="projectList" class="overflow-y-auto custom-scroll space-y-3 pr-2 flex-1"></div>
                    </div>

                    <div class="neo-card bg-white p-6 h-[400px] flex flex-col border-t-[8px] border-[#4ade80]">
                        <h3 class="text-sm font-black uppercase tracking-widest mb-4 border-b-3 border-black pb-2 flex items-center justify-between">
                            <span><i class="ph-bold ph-git-commit"></i> Riwayat Log & BAP</span>
                            <button onclick="fetchDevData()" class="neo-btn px-2 py-1 bg-gray-100 text-[10px] shadow-none"><i class="ph-bold ph-arrows-clockwise"></i></button>
                        </h3>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left border-collapse text-xs font-mono">
                                <thead>
                                    <tr class="border-b-[3px] border-black bg-gray-100">
                                        <th class="py-2 px-2 uppercase">Waktu</th>
                                        <th class="py-2 px-2 uppercase">Proyek</th>
                                        <th class="py-2 px-2 uppercase">Kategori</th>
                                        <th class="py-2 px-2 uppercase">Teknisi</th>
                                    </tr>
                                </thead>
                                <tbody id="logHistoryBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const WEBHOOK_URL = 'https://n8n-mzbmiib3etk4.kangkung.sumopod.my.id/webhook/beuna-crm-api';
        let session = JSON.parse(localStorage.getItem('beunaSession'));
        
        if(!session) window.location.href = 'index.html';
        const role = session.role.toLowerCase();
        
        if(role === 'staff' || role === 'sales') {
            alert("Akses Ditolak: Halaman ini khusus Tim Developer & Manager.");
            window.location.href = 'crm.html';
        }
        if(role === 'developer') {
            document.getElementById('nav-crm').style.display = 'none';
            document.getElementById('nav-docs').style.display = 'none';
        }
        document.getElementById('devName').innerText = session.name;

        let ongoingProjects = [];
        let devLogs = [];

        window.onload = () => { 
            // Set Kalender ke hari ini secara otomatis
            document.getElementById('logDate').valueAsDate = new Date();
            fetchDevData(); 
        };

        async function fetchDevData() {
            toggleLoader(true);
            try {
                // Fetch Ongoing Projects
                try {
                    const resP = await fetch(WEBHOOK_URL, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ACTION:'get_on_going'}) });
                    const jsonP = await resP.json();
                    ongoingProjects = jsonP.data ? jsonP.data.filter(p => 
                        ((p.STATUS || '').toLowerCase() === 'development' || (p.STATUS || '').toLowerCase() === 'maintenance') &&
                        (p.CLEINT_NAME || p.PROJECT_NAME)
                    ) : [];
                } catch(e) { console.error("Gagal menarik data project", e); }

                // Fetch Dev Logs
                try {
                    const resL = await fetch(WEBHOOK_URL, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ACTION:'get_dev_log'}) });
                    const jsonL = await resL.json();
                    devLogs = jsonL.data ? jsonL.data.reverse() : []; 
                } catch(e) { console.error("Gagal menarik data log", e); }

            } finally { 
                renderUI(); 
                toggleLoader(false); 
            }
        }

        async function submitDevLog(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSubmitLog');
            btn.innerHTML = 'PUSHING...'; btn.disabled = true;

            const payload = {
                ACTION: 'create_dev_log',
                project_id: document.getElementById('logProject').value,
                category: document.getElementById('logCategory').value,
                detail: document.getElementById('logDetail').value,
                pic_dev: session.name,
                
                // MENGIRIM TANGGAL KE VARIABEL STATUS AGAR DITANGKAP N8N SESUAI REQUEST ANDA
                status: document.getElementById('logDate').value,
                
                // Saya kirimkan juga di variabel tanggal untuk jaga-jaga
                tanggal: document.getElementById('logDate').value 
            };

            try {
                const res = await fetch(WEBHOOK_URL, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
                if(res.ok) { 
                    // Jangan reset kalender ke kosong, cukup form teksnya saja
                    document.getElementById('logDetail').value = "";
                    fetchDevData(); 
                }
            } catch(e) { alert("Gagal mengirim log ke server."); } 
            finally { btn.innerHTML = 'Push to N8N Database'; btn.disabled = false; }
        }

        function renderUI() {
            const sel = document.getElementById('logProject');
            if(ongoingProjects.length === 0) {
                sel.innerHTML = '<option value="" disabled selected>-- Tidak ada proyek aktif --</option>';
            } else {
                sel.innerHTML = '<option value="" disabled selected>-- Pilih Proyek --</option>' + 
                    ongoingProjects.map(p => {
                        const id = p.PROJECT_NAME || p.PROJECT_ID || p.id || p.CLEINT_NAME;
                        const name = p.CLEINT_NAME || p.PROJECT_NAME;
                        return `<option value="${id}">${name}</option>`;
                    }).join('');
            }

            document.getElementById('statActive').innerText = ongoingProjects.length;
            document.getElementById('projectList').innerHTML = ongoingProjects.map(p => `
                <div class="flex justify-between items-center p-3 border-2 border-black bg-[#f4f4f0] rounded hover:bg-[#bbf7d0] transition-colors">
                    <div>
                        <h4 class="font-black text-sm uppercase">${p.CLEINT_NAME || p.PROJECT_NAME}</h4>
                        <p class="text-[10px] font-bold text-gray-500">Tipe: ${p.PROJECT_TYPE || 'Sistem'}</p>
                    </div>
                    <span class="bg-[#4ade80] px-2 py-1 text-[9px] font-black uppercase border border-black shadow-[2px_2px_0_0_#000]">DEV</span>
                </div>
            `).join('');

            document.getElementById('logHistoryBody').innerHTML = devLogs.slice(0, 50).map(log => {
                const proj = ongoingProjects.find(p => String(p.PROJECT_NAME || p.CLEINT_NAME) === String(log.PROJECT_ID));
                const pName = proj ? (proj.CLEINT_NAME || proj.PROJECT_NAME) : (log.PROJECT_ID || 'Unknown ID');
                
                // Menampilkan Tanggal (Prioritaskan kolom TANGGAL / STATUS dari N8N, jika kosong pakai TIMESTAMP sistem)
                const displayDate = log.TANGGAL || log.STATUS || log.TIMESTAMP || '-';
                
                return `
                <tr class="border-b border-gray-200 hover:bg-gray-50">
                    <td class="py-3 px-2 text-[10px] text-gray-500 font-bold">${displayDate}</td>
                    <td class="py-3 px-2 font-bold text-xs truncate max-w-[120px]" title="${pName}">${pName}</td>
                    <td class="py-3 px-2 text-[10px]"><span class="bg-black text-white px-2 py-0.5 rounded uppercase">${log.LOG_TYPE || '-'}</span></td>
                    <td class="py-3 px-2 text-xs font-bold">${log.AUTHOR || '-'}</td>
                </tr>
                <tr class="border-b-2 border-black bg-gray-50"><td colspan="4" class="px-2 pb-3 pt-1 text-[11px] italic text-gray-700">=> ${log.DESCRIPTION || '-'}</td></tr>`;
            }).join('');
        }

        function toggleLoader(s) { document.getElementById('loadingOverlay').classList.toggle('hidden', !s); }
        function logout() { localStorage.removeItem('beunaSession'); window.location.href = 'index.html'; }
    </script>
</body>
</html>
