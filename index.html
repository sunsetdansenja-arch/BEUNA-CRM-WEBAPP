<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEUNA CRM - Folder Layout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #09090b;
            color: #fafafa;
            overflow-x: hidden;
            background-image: 
                radial-gradient(at 0% 0%, rgba(79, 70, 229, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.1) 0px, transparent 50%);
            background-attachment: fixed;
        }

        /* --- FOLDER TAB AESTHETICS --- */
        .folder-tab {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: none;
            border-radius: 0.75rem 0.75rem 0 0;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: rgba(255,255,255,0.7);
        }
        
        .folder-content {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0 1.5rem 1.5rem 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Khusus tab yang ada di kolom grid, border radius disesuaikan */
        .folder-content-grid {
            border-radius: 0 1rem 1rem 1rem;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }
        .glass-card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* Custom Scrollbar for Fresh Leads container */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in { animation: fadeIn 0.4s ease forwards; }
    </style>
</head>
<body class="p-4 md:p-8 antialiased">

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="fixed inset-0 flex items-center justify-center z-50 transition-opacity duration-500 bg-[#09090b]">
        <div class="folder-content p-10 w-full max-w-sm flex flex-col items-center relative">
            <h1 class="text-2xl font-bold mb-2 tracking-tight">Beuna CRM</h1>
            <p class="text-sm text-white/40 mb-8 text-center">Login to your workspace</p>
            <form id="loginForm" class="w-full space-y-4">
                <input type="text" id="username" placeholder="Username" class="w-full bg-black/30 border border-white/10 rounded-xl px-5 py-4 text-sm focus:outline-none focus:border-indigo-500/50" required>
                <input type="password" id="password" placeholder="Password" class="w-full bg-black/30 border border-white/10 rounded-xl px-5 py-4 text-sm focus:outline-none focus:border-indigo-500/50" required>
                <button type="submit" id="loginBtn" class="w-full bg-white text-black font-bold rounded-xl py-4 text-sm hover:bg-indigo-400 hover:text-white transition-all">Sign In</button>
                <div id="loginError" class="text-red-400 text-xs text-center hidden font-medium">Invalid credentials</div>
            </form>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="mainDashboard" class="hidden min-h-screen max-w-[1400px] mx-auto space-y-10">
        
        <!-- HEADER ROW -->
        <div class="flex justify-between items-center px-2">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-500/20 rounded-xl flex items-center justify-center border border-indigo-500/30">
                    <i class="ph-fill ph-planet text-indigo-400"></i>
                </div>
                <div>
                    <h2 class="text-sm font-bold leading-tight">Beuna Workspace</h2>
                    <p id="userRoleBadge" class="text-[10px] text-indigo-300 font-black tracking-widest uppercase">ROLE</p>
                </div>
            </div>
            <button onclick="logout()" class="text-white/40 hover:text-red-400 transition-colors">
                <i class="ph-bold ph-power text-xl"></i>
            </button>
        </div>

        <!-- 1. PROGRESS SECTION (TOP) -->
        <section>
            <div class="folder-tab">
                <i class="ph-bold ph-chart-pie-slice"></i> Progress
            </div>
            <div class="folder-content p-8 flex flex-wrap md:flex-nowrap justify-between items-center gap-8">
                <div class="flex items-end gap-3">
                    <span id="stat-conversion" class="text-5xl md:text-6xl font-black tracking-tighter text-white">0%</span>
                    <span class="text-green-400 font-bold mb-1 flex items-center gap-1 text-xs uppercase tracking-widest">
                        <i class="ph-bold ph-trend-up"></i> Closing Rate
                    </span>
                </div>
                <div class="flex gap-8 md:gap-16 border-t md:border-t-0 border-white/10 pt-4 md:pt-0 w-full md:w-auto">
                    <div>
                        <p class="text-white/40 text-[9px] uppercase font-black mb-1 tracking-widest">Total Reach</p>
                        <p id="stat-reach" class="text-xl font-bold">0</p>
                    </div>
                    <div>
                        <p class="text-white/40 text-[9px] uppercase font-black mb-1 tracking-widest">Meeting / Nego</p>
                        <p id="stat-nego" class="text-xl font-bold text-yellow-400">0</p>
                    </div>
                    <div>
                        <p class="text-white/40 text-[9px] uppercase font-black mb-1 tracking-widest">Closing</p>
                        <p id="stat-deal" class="text-xl font-bold text-green-400">0</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- 2. FRESH LEADS SECTION (MIDDLE - 2 BOXES) -->
        <section>
            <div class="folder-tab">
                <i class="ph-bold ph-sparkle"></i> Fresh Leads
                <span id="count-pool" class="ml-2 bg-indigo-500/20 text-indigo-300 px-2 py-0.5 rounded-full text-[9px]">0</span>
            </div>
            <div class="folder-content p-6 flex flex-col gap-4">
                <!-- SORT / SEARCH BAR (Inside Folder Content) -->
                <div class="flex gap-3 bg-black/20 p-2 rounded-xl border border-white/5">
                    <div class="flex-1 flex items-center gap-2 px-3">
                        <i class="ph-bold ph-magnifying-glass text-white/30"></i>
                        <input type="text" id="searchLeads" oninput="renderUI(this.value)" placeholder="Sort / Search by name or area..." class="bg-transparent text-xs w-full focus:outline-none text-white placeholder-white/30 py-2">
                    </div>
                </div>

                <!-- 2 COLUMNS GRID FOR FRESH LEADS -->
                <div id="leadStream" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 max-h-[300px] overflow-y-auto custom-scroll pr-2">
                    <!-- Cards Injected Here -->
                    <p class="text-white/20 italic text-sm p-4">Syncing fresh leads...</p>
                </div>
            </div>
        </section>

        <!-- 3. PIPELINE KANBAN (BOTTOM - 3 COLUMNS) -->
        <section class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <!-- FIRST MESSAGE -->
            <div>
                <div class="folder-tab text-indigo-300 border-indigo-500/20 bg-indigo-500/5">
                    First Message <span id="count-chat" class="ml-2 opacity-50">0</span>
                </div>
                <div class="folder-content folder-content-grid p-4 border-indigo-500/20 bg-indigo-500/5 min-h-[300px] flex flex-col gap-3" id="col-chat"></div>
            </div>

            <!-- MEETING / NEGO -->
            <div>
                <div class="folder-tab text-yellow-300 border-yellow-500/20 bg-yellow-500/5">
                    Meeting / Nego <span id="count-nego-col" class="ml-2 opacity-50">0</span>
                </div>
                <div class="folder-content folder-content-grid p-4 border-yellow-500/20 bg-yellow-500/5 min-h-[300px] flex flex-col gap-3" id="col-nego"></div>
            </div>

            <!-- CLOSING -->
            <div>
                <div class="folder-tab text-green-300 border-green-500/20 bg-green-500/5">
                    Closing <span id="count-deal-col" class="ml-2 opacity-50">0</span>
                </div>
                <div class="folder-content folder-content-grid p-4 border-green-500/20 bg-green-500/5 min-h-[300px] flex flex-col gap-3" id="col-deal"></div>
            </div>

        </section>

        <!-- REJECTED BASEMENT -->
        <footer class="pt-8 pb-20 border-t border-white/5 mt-10">
            <button onclick="toggleBasement()" class="flex items-center gap-2 text-white/20 hover:text-white/50 transition-all mx-auto mb-6 text-[10px] font-black tracking-widest uppercase">
                <i id="basement-icon" class="ph-bold ph-caret-down"></i> Show Rejected Leads
            </button>
            <div id="basementContent" class="hidden grid grid-cols-1 md:grid-cols-4 gap-4 opacity-40"></div>
        </footer>

    </div>

    <!-- LOGIC -->
    <script>
        const WEBHOOK_URL = 'https://n8n-mzbmiib3etk4.kangkung.sumopod.my.id/webhook/beuna-crm-api';
        let currentUser = null;
        let allLeads = [];

        // LOGIN
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('loginError');

            btn.innerHTML = `AUTHENTICATING...`; err.classList.add('hidden');

            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ACTION: 'get_auth', username: u, password: p })
                });

                const res = await response.json();
                let userData = null;
                
                if (res.status === "success" && res.data) {
                    userData = Array.isArray(res.data) ? res.data[0] : res.data;
                }

                if (userData && userData.USERNAME) {
                    currentUser = userData; 
                    initDashboard();
                } else throw new Error();
            } catch (error) {
                btn.innerHTML = `Sign In`;
                err.classList.remove('hidden');
                err.innerText = "Access Denied";
            }
        });

        function initDashboard() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainDashboard').classList.remove('hidden');
            document.getElementById('userRoleBadge').innerText = currentUser.ROLE || 'Team Member';
            loadLeads();
        }

        async function loadLeads() {
            try {
                const res = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ ACTION: 'get_leads' })
                });
                const response = await res.json();
                allLeads = response.data || [];
                renderUI();
            } catch (e) { console.error("Sync failed", e); }
        }

        function renderUI(filterText = "") {
            const pool = document.getElementById('leadStream');
            const colChat = document.getElementById('col-chat');
            const colNego = document.getElementById('col-nego');
            const colDeal = document.getElementById('col-deal');
            const basement = document.getElementById('basementContent');

            pool.innerHTML = ''; colChat.innerHTML = ''; colNego.innerHTML = ''; colDeal.innerHTML = ''; basement.innerHTML = '';

            let stats = { reach: 0, nego: 0, deal: 0, reject: 0 };
            const lowerFilter = filterText.toLowerCase();

            allLeads.forEach(lead => {
                const name = (lead.NAMA_USAHA || lead.NAMA_LEAD || '').toLowerCase();
                const region = (lead.DAERAH || '').toLowerCase();
                if (filterText && !name.includes(lowerFilter) && !region.includes(lowerFilter)) return;

                const status = (lead.STATUS || '').toLowerCase();
                const card = createCard(lead, status);

                if (status === '' || status.includes('new')) {
                    pool.appendChild(card);
                } else if (status.includes('pesan') || status.includes('first message')) {
                    colChat.appendChild(card);
                    stats.reach++;
                } else if (status.includes('nego') || status.includes('meeting')) {
                    colNego.appendChild(card);
                    stats.reach++; stats.nego++;
                } else if (status.includes('deal') || status.includes('closing')) {
                    colDeal.appendChild(card);
                    stats.reach++; stats.deal++;
                } else if (status.includes('reject')) {
                    basement.appendChild(card);
                    stats.reach++; stats.reject++;
                }
            });

            // Update Stats
            document.getElementById('stat-reach').innerText = stats.reach;
            document.getElementById('stat-nego').innerText = stats.nego;
            document.getElementById('stat-deal').innerText = stats.deal;
            const rate = stats.reach > 0 ? Math.round((stats.deal / stats.reach) * 100) : 0;
            document.getElementById('stat-conversion').innerText = rate + '%';
            
            document.getElementById('count-pool').innerText = pool.children.length;
            document.getElementById('count-chat').innerText = colChat.children.length;
            document.getElementById('count-nego-col').innerText = colNego.children.length;
            document.getElementById('count-deal-col').innerText = colDeal.children.length;
        }

        function createCard(lead, status) {
            const div = document.createElement('div');
            const isPool = (status === '' || status.includes('new'));
            
            div.className = `glass-card p-4 rounded-xl animate-in flex flex-col gap-3`;
            div.innerHTML = `
                <div class="flex justify-between items-start">
                    <span class="text-[8px] bg-white/10 px-2 py-0.5 rounded text-white/70 uppercase font-bold">${lead.DAERAH || 'AREA'}</span>
                    <span class="text-[10px] text-white/40">${lead.INDUSTRI || 'General'}</span>
                </div>
                <div>
                    <h4 class="font-bold text-sm text-white truncate">${lead.NAMA_USAHA || lead.NAMA_LEAD || 'No Name'}</h4>
                </div>
                <div class="flex gap-2 mt-auto">
                    ${isPool ? `
                        <button onclick="updateStatus('${lead.id}', 'Pesan Terkirim', true)" class="flex-1 bg-indigo-500 text-white text-[10px] font-bold py-2 rounded-lg hover:bg-indigo-400 transition-all">START (1ST MSG)</button>
                        <button onclick="updateStatus('${lead.id}', 'REJECTED')" class="w-8 bg-white/5 text-white/40 py-2 rounded-lg hover:bg-red-500/30 hover:text-red-400 border border-white/5"><i class="ph-bold ph-x"></i></button>
                    ` : `
                        <a href="https://wa.me/${(lead.NOMOR_WA || '').toString().replace(/[^0-9]/g, '')}" target="_blank" class="flex-1 bg-green-500/20 text-green-400 text-center text-[10px] font-bold py-2 rounded-lg hover:bg-green-500/30 transition-all flex items-center justify-center gap-1"><i class="ph-fill ph-whatsapp-logo"></i> WA</a>
                        <button onclick="nextStep('${lead.id}', '${lead.STATUS}')" class="w-8 bg-white/10 text-white py-2 rounded-lg hover:bg-white/20 transition-all"><i class="ph-bold ph-check"></i></button>
                    `}
                </div>
            `;
            return div;
        }

        async function updateStatus(id, newStatus, isReach = false) {
            if(isReach) {
                const text = "Halo! Kami dari Beuna Agency melihat profil bisnis Anda. Kami ada ide menarik untuk kolaborasi. Boleh ngobrol sebentar?";
                navigator.clipboard.writeText(text);
            }

            try {
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ ACTION: 'update_lead_status', lead_id: id, new_status: newStatus })
                });
                loadLeads();
            } catch (e) { console.error("Update failed", e); }
        }

        function nextStep(id, current) {
            const s = current.toLowerCase();
            let next = "Pesan Terkirim";
            if(s.includes('pesan') || s.includes('first message')) next = "Meeting / Nego";
            else if(s.includes('nego') || s.includes('meeting')) next = "Closing";
            updateStatus(id, next);
        }

        function toggleBasement() {
            const content = document.getElementById('basementContent');
            const icon = document.getElementById('basement-icon');
            content.classList.toggle('hidden');
            icon.classList.toggle('rotate-180');
        }

        function logout() { location.reload(); }
        setInterval(loadLeads, 60000);
    </script>
</body>
</html>
