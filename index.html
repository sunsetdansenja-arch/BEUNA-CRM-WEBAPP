<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beuna OS - Management Hub</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/sunsetdansenja-arch/beuna-agency/main/beuna%20logo%20v2.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; color: #1d1d1f; }
        .glass-panel { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.05); }
        .folder-tab { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1.2rem; background: rgba(255, 255, 255, 0.8); border: 1px solid rgba(255, 255, 255, 1); border-bottom: none; border-radius: 0.75rem 0.75rem 0 0; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: #4b5563; }
        .folder-content { background: rgba(255, 255, 255, 0.6); border: 1px solid rgba(255, 255, 255, 0.8); border-radius: 0 1.2rem 1.2rem 1.2rem; }
        .glass-card { background: rgba(255, 255, 255, 0.9); border: 1px solid white; transition: all 0.2s ease; }
        .glass-card:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.06); }
        .custom-scroll::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
        
        /* A4 Settings */
        .a4-paper { width: 210mm; min-height: 297mm; background: white; padding: 20mm; position: relative; margin: 0 auto; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        @media print { .no-print { display: none !important; } .a4-paper { box-shadow: none; padding: 15mm; width: 100%; } }
    </style>
</head>
<body class="antialiased flex h-screen overflow-hidden">

    <div id="loginView" class="fixed inset-0 flex items-center justify-center z-[100] bg-[#f5f7fa] transition-all">
        <div class="glass-panel p-10 w-full max-w-sm flex flex-col items-center rounded-3xl">
            <img src="https://raw.githubusercontent.com/sunsetdansenja-arch/beuna-agency/main/beuna%20logo%20v2.png" class="w-16 mb-4">
            <h1 class="text-xl font-extrabold mb-8">Beuna Management</h1>
            <form onsubmit="handleLogin(event)" class="w-full space-y-4">
                <input type="text" id="username" placeholder="Admin Username" class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-red-800">
                <input type="password" id="password" placeholder="Password" class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-red-800">
                <button type="submit" class="w-full bg-black text-white font-bold py-3 rounded-xl">Sign In</button>
            </form>
        </div>
    </div>

    <div id="mainView" class="hidden flex-1 flex overflow-hidden">
        <aside class="w-20 md:w-64 glass-panel border-r border-white/50 flex flex-col no-print z-50">
            <div class="p-6 flex items-center gap-3 border-b border-gray-200">
                <img src="https://raw.githubusercontent.com/sunsetdansenja-arch/beuna-agency/main/beuna%20logo%20v2.png" class="w-8">
                <span class="font-extrabold tracking-widest hidden md:block">BEUNA HQ</span>
            </div>
            <nav class="flex-1 p-4 space-y-2 mt-4">
                <button onclick="switchTab('crm')" id="nav-crm" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold bg-white shadow-sm border border-gray-200"><i class="ph-fill ph-funnel text-indigo-600"></i> <span class="hidden md:block">Pipeline</span></button>
                <button onclick="switchTab('docs')" id="nav-docs" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold text-gray-500"><i class="ph-fill ph-files"></i> <span class="hidden md:block">Generator</span></button>
            </nav>
            <div class="p-4 border-t border-gray-200">
                <button onclick="location.reload()" class="w-full flex items-center justify-center gap-2 py-3 rounded-xl text-xs font-bold text-red-600 hover:bg-red-50"><i class="ph-bold ph-power"></i> <span class="hidden md:block">Logout</span></button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto relative pb-20 custom-scroll">
            
            <div id="view-crm" class="p-6 md:p-10 space-y-8 no-print">
                <header class="flex justify-between items-end mb-4">
                    <div>
                        <h2 class="text-3xl font-extrabold tracking-tight">CRM Dashboard</h2>
                        <p class="text-sm text-gray-500">Menampilkan 3 project teratas per stage.</p>
                    </div>
                </header>

                <div class="flex gap-6 overflow-x-auto pb-4 custom-scroll">
                    <div class="min-w-[280px] flex-1" id="stage-new"></div>
                    <div class="min-w-[280px] flex-1" id="stage-reached"></div>
                    <div class="min-w-[280px] flex-1" id="stage-meeting"></div>
                    <div class="min-w-[280px] flex-1" id="stage-nego"></div>
                    <div class="min-w-[280px] flex-1" id="stage-won"></div>
                </div>
            </div>

            <div id="view-stage-detail" class="hidden p-6 md:p-10 space-y-6 no-print">
                <button onclick="switchTab('crm')" class="text-xs font-bold flex items-center gap-2"><i class="ph-bold ph-arrow-left"></i> Kembali ke Dashboard</button>
                <div class="flex justify-between items-center">
                    <h2 class="text-3xl font-extrabold" id="detail-stage-title text-indigo-800">Stage Detail</h2>
                </div>
                <div class="glass-panel rounded-3xl overflow-hidden">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-white/50 border-b border-gray-200">
                            <tr>
                                <th class="p-4 font-bold uppercase text-[10px] text-gray-400">Nama Client</th>
                                <th class="p-4 font-bold uppercase text-[10px] text-gray-400">Area</th>
                                <th class="p-4 font-bold uppercase text-[10px] text-gray-400">Status</th>
                                <th class="p-4 font-bold uppercase text-[10px] text-gray-400 text-right">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="detail-table-body"></tbody>
                    </table>
                </div>
            </div>

            <div id="view-docs" class="hidden p-10 space-y-6 no-print">
                <h2 class="text-3xl font-extrabold">Document Center</h2>
                <div class="grid grid-cols-4 gap-6" id="docs-hub-content"></div>
            </div>

        </main>
    </div>

    <script>
        const leads = [
            { id: 1, name: "PT Rantai Pasok", client: "Pak Rusdi", wa: "628123456789", status: "new", area: "Jakarta" },
            { id: 2, name: "Fortuna Laundry", client: "Admin", wa: "628123456789", status: "new", area: "Bandung" },
            { id: 3, name: "Reflexology 12", client: "Sutarman", wa: "628123456789", status: "reached", area: "Jakarta" },
            { id: 4, name: "Alaiiva Travel", client: "Mbak Sri", wa: "628123456789", status: "meeting", area: "Bali" },
            { id: 5, name: "Supply Alfamart", client: "Food Prod", wa: "628123456789", status: "nego", area: "Tangerang" },
            { id: 6, name: "Arena Playbox", client: "Manager", wa: "628123456789", status: "won", area: "Bekasi" },
            { id: 7, name: "Bugar Refleksi", client: "Owner", wa: "628123456789", status: "new", area: "Jakarta" },
            { id: 8, name: "Beuna Marketing", client: "Team", wa: "628123456789", status: "new", area: "Depok" },
        ];

        function handleLogin(e) {
            e.preventDefault();
            document.getElementById('loginView').classList.add('hidden');
            document.getElementById('mainView').classList.remove('hidden');
            renderDashboard();
        }

        function switchTab(tabId) {
            ['crm', 'docs', 'stage-detail'].forEach(id => document.getElementById(`view-${id}`).classList.add('hidden'));
            document.getElementById(`view-${tabId}`).classList.remove('hidden');
        }

        function renderDashboard() {
            const stages = ['new', 'reached', 'meeting', 'nego', 'won'];
            const labels = { new: 'Fresh Leads', reached: 'Reached Out', meeting: 'Discovery', nego: 'Proposal', won: 'Closed Won' };
            
            stages.forEach(stage => {
                const stageContainer = document.getElementById(`stage-${stage}`);
                const filtered = leads.filter(l => l.status === stage);
                const miniList = filtered.slice(0, 3); // Cukup tampilkan 3 data

                stageContainer.innerHTML = `
                    <div class="folder-tab">${labels[stage]} <span class="ml-2 opacity-40">${filtered.length}</span></div>
                    <div class="folder-content p-4 flex flex-col gap-3 min-h-[300px]">
                        ${miniList.map(l => createCard(l)).join('')}
                        ${filtered.length > 3 ? `<button onclick="showFullStage('${stage}')" class="text-[10px] font-bold text-gray-400 mt-2 hover:text-red-800 transition-colors">Lihat Semua (${filtered.length}) &rarr;</button>` : ''}
                    </div>
                `;
            });
        }

        function createCard(l) {
            return `
                <div class="glass-card p-4 rounded-2xl flex flex-col gap-2 relative group">
                    <div class="flex justify-between items-start">
                        <h4 class="font-bold text-xs truncate w-32">${l.name}</h4>
                        <a href="https://wa.me/${l.wa}" target="_blank" class="text-green-600 hover:scale-110 transition-transform">
                            <i class="ph-fill ph-whatsapp-logo text-xl"></i>
                        </a>
                    </div>
                    <p class="text-[10px] text-gray-500">${l.client} • ${l.area}</p>
                </div>
            `;
        }

        function showFullStage(stage) {
            switchTab('stage-detail');
            const filtered = leads.filter(l => l.status === stage);
            const tbody = document.getElementById('detail-table-body');
            
            tbody.innerHTML = filtered.map(l => `
                <tr class="border-b border-gray-100 hover:bg-white/40 transition-colors">
                    <td class="p-4 font-bold text-gray-800">${l.name}</td>
                    <td class="p-4 text-gray-500">${l.area}</td>
                    <td class="p-4 uppercase text-[10px] font-black tracking-widest text-indigo-600">${l.status}</td>
                    <td class="p-4 text-right">
                        <a href="https://wa.me/${l.wa}" target="_blank" class="bg-green-50 text-green-600 px-3 py-1 rounded-lg font-bold text-xs inline-flex items-center gap-2">
                            <i class="ph-fill ph-whatsapp-logo"></i> Connect WA
                        </a>
                    </td>
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
