<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEUNA CRM - Stream & Pipeline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #09090b;
            color: #fafafa;
            overflow-x: hidden;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .glass-input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
        }

        /* Stream Horizontal Scrollbar Custom */
        .stream-scroll::-webkit-scrollbar { height: 6px; }
        .stream-scroll::-webkit-scrollbar-track { background: transparent; }
        .stream-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .card-anim { transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .card-anim:hover { transform: translateY(-4px); background: rgba(255,255,255,0.06); }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in { animation: fadeIn 0.4s ease forwards; }
    </style>
</head>
<body class="antialiased">

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="fixed inset-0 flex items-center justify-center z-50 transition-opacity duration-500 bg-[#09090b]">
        <div class="glass w-full max-w-sm rounded-[2.5rem] p-10 flex flex-col items-center relative overflow-hidden">
            <div class="absolute -top-24 -right-24 w-48 h-48 bg-indigo-600/20 rounded-full blur-[64px]"></div>
            <div class="w-20 h-20 bg-white/5 rounded-3xl flex items-center justify-center mb-6 border border-white/10">
                <i class="ph-fill ph-planet text-4xl text-indigo-400"></i>
            </div>
            <h1 class="text-2xl font-bold mb-2 tracking-tight">Beuna CRM</h1>
            <p class="text-sm text-white/40 mb-8 text-center">Login to your workspace</p>

            <form id="loginForm" class="w-full space-y-4">
                <input type="text" id="username" placeholder="Username" class="w-full glass-input rounded-2xl px-5 py-4 text-sm focus:outline-none focus:border-indigo-500/50" required>
                <input type="password" id="password" placeholder="Password" class="w-full glass-input rounded-2xl px-5 py-4 text-sm focus:outline-none focus:border-indigo-500/50" required>
                <button type="submit" id="loginBtn" class="w-full bg-white text-black font-bold rounded-2xl py-4 text-sm hover:bg-indigo-400 hover:text-white transition-all flex justify-center items-center gap-2">
                    <span>Sign In</span>
                    <i class="ph-bold ph-arrow-right"></i>
                </button>
                <div id="loginError" class="text-red-400 text-xs text-center hidden font-medium">Invalid credentials</div>
            </form>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="mainDashboard" class="hidden min-h-screen p-4 md:p-8 max-w-[1600px] mx-auto">
        
        <!-- HEADER STATS (BIG CARD) -->
        <header class="glass rounded-[2.5rem] p-8 md:p-10 mb-10 flex flex-wrap md:flex-nowrap items-center justify-between gap-8 relative overflow-hidden">
            <div class="absolute -top-24 -left-24 w-64 h-64 bg-indigo-600/20 rounded-full blur-[80px]"></div>
            
            <div class="relative z-10">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-10 h-10 bg-indigo-500/20 rounded-xl flex items-center justify-center border border-indigo-500/30">
                        <i class="ph-fill ph-planet text-indigo-400"></i>
                    </div>
                    <span id="userRoleBadge" class="text-[10px] font-black uppercase tracking-widest text-indigo-300 bg-indigo-500/10 px-3 py-1 rounded-full">Project Manager</span>
                </div>
                <h1 class="text-white/40 text-xs font-black uppercase tracking-[0.2em] mb-1">Conversion Performance</h1>
                <div class="flex items-end gap-3">
                    <span id="stat-conversion" class="text-6xl md:text-7xl font-black tracking-tighter text-white">0%</span>
                    <span class="text-green-400 font-bold mb-2 flex items-center gap-1 text-sm">
                        <i class="ph-bold ph-trend-up"></i> Deal Rate
                    </span>
                </div>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-6 md:gap-12 relative z-10 w-full md:w-auto border-t md:border-t-0 md:border-l border-white/10 pt-6 md:pt-0 md:pl-12">
                <div>
                    <p class="text-white/40 text-[10px] uppercase font-black mb-1 tracking-widest">Total Reach</p>
                    <p id="stat-reach" class="text-2xl font-bold">0</p>
                </div>
                <div>
                    <p class="text-white/40 text-[10px] uppercase font-black mb-1 tracking-widest">On Nego</p>
                    <p id="stat-nego" class="text-2xl font-bold text-yellow-400">0</p>
                </div>
                <div>
                    <p class="text-white/40 text-[10px] uppercase font-black mb-1 tracking-widest">Closed Won</p>
                    <p id="stat-deal" class="text-2xl font-bold text-green-400">0</p>
                </div>
                <button onclick="logout()" class="w-12 h-12 glass rounded-2xl flex items-center justify-center hover:bg-red-500/20 hover:text-red-400 transition-all self-center ml-auto">
                    <i class="ph-bold ph-power"></i>
                </button>
            </div>
        </header>

        <!-- NEW LEADS POOL (STREAM) -->
        <section class="mb-12">
            <div class="flex items-center justify-between mb-6 px-4">
                <h2 class="text-xl font-bold tracking-tight flex items-center gap-3">
                    <i class="ph-fill ph-lightning text-yellow-400"></i> Lead Stream 
                    <span id="count-pool" class="text-xs bg-white/10 px-3 py-1 rounded-full text-white/50 font-bold">0</span>
                </h2>
                <input type="text" id="searchLeads" oninput="renderUI(this.value)" placeholder="Search by name or region..." class="glass text-xs rounded-2xl px-6 py-3 w-64 focus:outline-none focus:border-indigo-500/50 transition-all">
            </div>
            
            <div id="leadStream" class="stream-scroll flex gap-5 overflow-x-auto pb-6 px-4 min-h-[150px]">
                <!-- Cards injected by JS -->
                <p class="text-white/20 italic text-sm">Syncing with database...</p>
            </div>
        </section>

        <!-- MAIN PIPELINE (KANBAN) -->
        <section class="grid grid-cols-1 md:grid-cols-3 gap-8 px-4 mb-20">
            <!-- COL: CHAT -->
            <div class="flex flex-col gap-5">
                <h3 class="text-[11px] font-black text-indigo-400 uppercase tracking-[0.2em] flex justify-between items-center border-b border-indigo-500/20 pb-3">
                    <span>Pesan Terkirim</span>
                    <span id="count-chat" class="text-white/20 text-lg">0</span>
                </h3>
                <div id="col-chat" class="flex flex-col gap-4 min-h-[200px]"></div>
            </div>

            <!-- COL: NEGO -->
            <div class="flex flex-col gap-5">
                <h3 class="text-[11px] font-black text-yellow-400 uppercase tracking-[0.2em] flex justify-between items-center border-b border-yellow-500/20 pb-3">
                    <span>Negosiasi</span>
                    <span id="count-nego-col" class="text-white/20 text-lg">0</span>
                </h3>
                <div id="col-nego" class="flex flex-col gap-4 min-h-[200px]"></div>
            </div>

            <!-- COL: DEAL -->
            <div class="flex flex-col gap-5">
                <h3 class="text-[11px] font-black text-green-400 uppercase tracking-[0.2em] flex justify-between items-center border-b border-green-500/20 pb-3">
                    <span>Closing / Deal</span>
                    <span id="count-deal-col" class="text-white/20 text-lg">0</span>
                </h3>
                <div id="col-deal" class="flex flex-col gap-4 min-h-[200px]"></div>
            </div>
        </section>

        <!-- REJECTED BASEMENT -->
        <footer class="border-t border-white/5 pt-12 pb-32 px-4">
            <button onclick="toggleBasement()" class="flex items-center gap-3 text-white/20 hover:text-white/50 transition-all mx-auto mb-10 group uppercase font-black tracking-[0.3em] text-[10px]">
                <i id="basement-icon" class="ph-bold ph-caret-down transition-transform"></i>
                <span>Show Rejected & Lost Leads</span>
            </button>
            <div id="basementContent" class="hidden grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4 opacity-40">
                <!-- Rejected cards -->
            </div>
        </footer>
    </div>

    <script>
        const WEBHOOK_URL = 'https://n8n-mzbmiib3etk4.kangkung.sumopod.my.id/webhook/beuna-crm-api';
        let currentUser = null;
        let allLeads = [];

        // --- LOGIN LOGIC ---
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('loginError');

            btn.innerHTML = `<i class="ph-bold ph-spinner animate-spin"></i> AUTHENTICATING...`;
            err.classList.add('hidden');

            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ACTION: 'get_auth', username: u, password: p })
                });

                const res = await response.json();
                let userData = null;
                
                if (res.status === "success" && res.data) {
                    userData = Array.isArray(res.data) ? res.data[0] : res.data;
                }

                if (userData && userData.USERNAME) {
                    currentUser = userData; 
                    initDashboard();
                } else {
                    throw new Error();
                }
            } catch (error) {
                btn.innerHTML = `<span>Sign In</span><i class="ph-bold ph-arrow-right"></i>`;
                err.classList.remove('hidden');
                err.innerText = "Access Denied: Wrong credentials or CORS error";
            }
        });

        function initDashboard() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainDashboard').classList.remove('hidden');
            document.getElementById('userRoleBadge').innerText = currentUser.ROLE || 'Team Member';
            loadLeads();
        }

        async function loadLeads() {
            try {
                const res = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ ACTION: 'get_leads' })
                });
                const response = await res.json();
                allLeads = response.data || [];
                renderUI();
            } catch (e) { console.error("Sync failed", e); }
        }

        function renderUI(filterText = "") {
            const pool = document.getElementById('leadStream');
            const colChat = document.getElementById('col-chat');
            const colNego = document.getElementById('col-nego');
            const colDeal = document.getElementById('col-deal');
            const basement = document.getElementById('basementContent');

            pool.innerHTML = ''; colChat.innerHTML = ''; colNego.innerHTML = ''; colDeal.innerHTML = ''; basement.innerHTML = '';

            let stats = { reach: 0, nego: 0, deal: 0, reject: 0 };
            const lowerFilter = filterText.toLowerCase();

            allLeads.forEach(lead => {
                const name = (lead.NAMA_USAHA || lead.NAMA_LEAD || '').toLowerCase();
                const region = (lead.DAERAH || '').toLowerCase();
                if (filterText && !name.includes(lowerFilter) && !region.includes(lowerFilter)) return;

                const status = (lead.STATUS || '').toLowerCase();
                const card = createCard(lead);

                if (status === '' || status.includes('new')) {
                    pool.appendChild(card);
                } else if (status.includes('pesan')) {
                    colChat.appendChild(card);
                    stats.reach++;
                } else if (status.includes('nego')) {
                    colNego.appendChild(card);
                    stats.reach++; stats.nego++;
                } else if (status.includes('deal') || status.includes('closing')) {
                    colDeal.appendChild(card);
                    stats.reach++; stats.deal++;
                } else if (status.includes('reject')) {
                    basement.appendChild(card);
                    stats.reach++; stats.reject++;
                }
            });

            // Update Stats
            document.getElementById('stat-reach').innerText = stats.reach;
            document.getElementById('stat-nego').innerText = stats.nego;
            document.getElementById('stat-deal').innerText = stats.deal;
            const rate = stats.reach > 0 ? Math.round((stats.deal / stats.reach) * 100) : 0;
            document.getElementById('stat-conversion').innerText = rate + '%';
            
            document.getElementById('count-pool').innerText = pool.children.length;
            document.getElementById('count-chat').innerText = colChat.children.length;
            document.getElementById('count-nego-col').innerText = colNego.children.length;
            document.getElementById('count-deal-col').innerText = colDeal.children.length;
        }

        function createCard(lead) {
            const div = document.createElement('div');
            const isPool = (!lead.STATUS || lead.STATUS.toLowerCase().includes('new'));
            
            div.className = `glass p-6 rounded-[2rem] min-w-[300px] md:min-w-0 card-anim border border-white/10 animate-in ${isPool ? '' : 'w-full'}`;
            div.innerHTML = `
                <div class="flex justify-between items-start mb-4">
                    <span class="text-[9px] bg-white/10 px-2.5 py-1 rounded-full text-white/60 uppercase font-black tracking-widest">${lead.DAERAH || 'UNKNOWN'}</span>
                    <div class="flex items-center gap-1 text-indigo-400 text-[10px] font-bold">
                        <i class="ph-fill ph-star"></i>
                        <span>${lead.RATING || '0'}</span>
                    </div>
                </div>
                <h4 class="font-bold text-sm mb-1 truncate text-white">${lead.NAMA_USAHA || lead.NAMA_LEAD || 'No Name'}</h4>
                <p class="text-[10px] text-white/30 mb-6 font-medium tracking-tight">${lead.INDUSTRI || 'General Industry'}</p>
                
                <div class="flex gap-2">
                    ${isPool ? `
                        <button onclick="updateStatus('${lead.id}', 'Pesan Terkirim', true)" class="flex-1 bg-white text-black text-[10px] font-black py-3 rounded-2xl hover:bg-indigo-500 hover:text-white transition-all uppercase">🚀 Reach</button>
                        <button onclick="updateStatus('${lead.id}', 'REJECTED')" class="w-12 bg-white/5 text-white/20 py-3 rounded-2xl hover:bg-red-500/20 hover:text-red-400 transition-all border border-white/5"><i class="ph-bold ph-prohibit"></i></button>
                    ` : `
                        <a href="https://wa.me/${(lead.NOMOR_WA || '').toString().replace(/[^0-9]/g, '')}" target="_blank" class="flex-1 bg-green-500/10 text-green-400 text-center text-[10px] font-black py-3 rounded-2xl border border-green-500/10 hover:bg-green-500/20 transition-all">WHATSAPP</a>
                        <button onclick="nextStep('${lead.id}', '${lead.STATUS}')" class="w-12 bg-white/10 text-white py-3 rounded-2xl hover:bg-white/20 transition-all flex justify-center items-center"><i class="ph-bold ph-caret-right"></i></button>
                    `}
                </div>
            `;
            return div;
        }

        async function updateStatus(id, newStatus, isReach = false) {
            if(isReach) {
                const text = "Halo! Kami dari Beuna Agency melihat profil bisnis Anda. Kami ada ide menarik untuk kolaborasi. Boleh ngobrol sebentar?";
                navigator.clipboard.writeText(text);
                // Alert visual simple
                const pool = document.getElementById('leadStream');
                pool.insertAdjacentHTML('afterbegin', `<div class="fixed top-10 left-1/2 -translate-x-1/2 bg-green-500 text-white px-6 py-2 rounded-full text-xs font-bold z-[100] animate-bounce">Copied & Moving Lead!</div>`);
                setTimeout(() => document.querySelector('.animate-bounce').remove(), 2000);
            }

            try {
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ ACTION: 'update_lead_status', lead_id: id, new_status: newStatus })
                });
                loadLeads();
            } catch (e) { console.error("Update failed", e); }
        }

        function nextStep(id, current) {
            const s = current.toLowerCase();
            let next = "Pesan Terkirim";
            if(s.includes('pesan')) next = "Negosiasi";
            else if(s.includes('nego')) next = "Closing / Deal";
            updateStatus(id, next);
        }

        function toggleBasement() {
            const content = document.getElementById('basementContent');
            const icon = document.getElementById('basement-icon');
            content.classList.toggle('hidden');
            icon.classList.toggle('rotate-180');
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
