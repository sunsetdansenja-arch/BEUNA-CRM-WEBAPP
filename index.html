<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEUNA CRM - Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(circle at top left, #1a1a2e, #0f0f1a);
            color: #f8fafc;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .glass-input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }
        
        .glass-input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.05);
        }

        .folder-tab {
            position: relative;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom: none;
            transition: all 0.2s ease;
        }
        .folder-tab.active {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            color: #fff;
            z-index: 10;
        }
        .folder-tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 1px;
            background: rgba(255, 255, 255, 0.08);
        }

        .kanban-col::-webkit-scrollbar { display: none; }
        .kanban-col { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="antialiased selection:bg-indigo-500/30">

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="fixed inset-0 flex items-center justify-center z-50 transition-opacity duration-500">
        <div class="glass-panel w-full max-w-sm rounded-[2rem] p-8 flex flex-col items-center relative overflow-hidden">
            <div class="absolute -top-20 -right-20 w-40 h-40 bg-indigo-500 rounded-full mix-blend-multiply filter blur-[64px] opacity-50"></div>
            
            <div class="w-16 h-16 bg-white/10 rounded-2xl flex items-center justify-center mb-6 border border-white/10">
                <i class="ph-fill ph-planet text-3xl text-indigo-400"></i>
            </div>
            <h1 class="text-2xl font-semibold mb-1 tracking-tight">Beuna Workspace</h1>
            <p class="text-sm text-white/50 mb-8">Enter your credentials to continue</p>

            <form id="loginForm" class="w-full space-y-4">
                <div>
                    <input type="text" id="username" placeholder="Username (e.g. dimas)" class="w-full glass-input rounded-xl px-4 py-3 text-sm placeholder-white/30" required>
                </div>
                <div>
                    <input type="password" id="password" placeholder="Password" class="w-full glass-input rounded-xl px-4 py-3 text-sm placeholder-white/30" required>
                </div>
                <button type="submit" id="loginBtn" class="w-full bg-white text-black font-medium rounded-xl px-4 py-3 text-sm hover:bg-gray-200 transition-colors mt-2 flex justify-center items-center gap-2">
                    <span>Sign In</span>
                    <i class="ph ph-arrow-right"></i>
                </button>
                <div id="loginError" class="text-red-400 text-xs text-center hidden mt-2">Invalid credentials</div>
            </form>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="mainDashboard" class="hidden min-h-screen p-4 md:p-8 flex flex-col">
        
        <header class="flex justify-between items-center mb-8 glass-panel rounded-2xl px-6 py-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-500/20 rounded-full flex items-center justify-center border border-indigo-500/30">
                    <i class="ph-fill ph-planet text-indigo-400"></i>
                </div>
                <div>
                    <h2 class="text-lg font-semibold leading-tight">Beuna CRM</h2>
                    <p id="userRoleBadge" class="text-xs text-indigo-300 font-medium tracking-wide uppercase">ROLE</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right hidden sm:block">
                    <p id="userFullName" class="text-sm font-medium">Name</p>
                    <p id="userInitials" class="text-xs text-white/50">@username</p>
                </div>
                <button onclick="logout()" class="w-10 h-10 glass-panel rounded-full flex items-center justify-center hover:bg-white/10 transition">
                    <i class="ph ph-sign-out text-lg"></i>
                </button>
            </div>
        </header>

        <div class="flex gap-2 px-4 relative z-10">
            <button onclick="switchTab('todo')" id="tab-todo" class="folder-tab active px-6 py-3 rounded-t-xl text-sm font-medium text-white/50 flex items-center gap-2">
                <i class="ph ph-check-circle"></i> To-Do Harian
            </button>
            <button onclick="switchTab('leads')" id="tab-leads" class="folder-tab px-6 py-3 rounded-t-xl text-sm font-medium text-white/50 flex items-center gap-2">
                <i class="ph ph-kanban"></i> Kanban Leads
            </button>
        </div>

        <main class="glass-panel rounded-3xl rounded-tl-none p-6 md:p-8 flex-1 relative z-0">
            
            <!-- VIEW: TO DO -->
            <div id="view-todo" class="block animate-fade-in">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-semibold">Your Tasks</h3>
                    <button id="btnAssignTask" class="hidden bg-white/10 hover:bg-white/20 border border-white/10 px-4 py-2 rounded-lg text-sm transition items-center gap-2">
                        <i class="ph ph-plus"></i> Assign Task
                    </button>
                </div>
                <div id="todoContainer" class="space-y-3">
                    <p class="text-sm text-white/40 italic">Loading tasks...</p>
                </div>
            </div>

            <!-- VIEW: LEADS -->
            <div id="view-leads" class="hidden animate-fade-in h-full flex flex-col">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-semibold">Leads Pipeline</h3>
                </div>

                <div class="flex gap-4 overflow-x-auto pb-4 kanban-col h-[60vh]">
                    
                    <!-- NEW LEAD COL -->
                    <div class="min-w-[300px] w-[300px] bg-black/20 rounded-2xl p-4 border border-white/5 flex flex-col">
                        <h4 class="text-sm font-medium text-white/50 mb-4 flex items-center justify-between">
                            <span>New Lead</span>
                            <span id="count-new" class="bg-white/10 text-xs px-2 py-0.5 rounded-full">0</span>
                        </h4>
                        <div id="list-new" class="flex flex-col gap-3"></div>
                    </div>

                    <!-- PESAN PERTAMA COL -->
                    <div class="min-w-[300px] w-[300px] bg-black/20 rounded-2xl p-4 border border-white/5 flex flex-col">
                        <h4 class="text-sm font-medium text-indigo-300 mb-4 flex items-center justify-between">
                            <span>Pesan Pertama Terkirim</span>
                            <span id="count-pesan" class="bg-white/10 text-xs px-2 py-0.5 rounded-full">0</span>
                        </h4>
                        <div id="list-pesan" class="flex flex-col gap-3"></div>
                    </div>

                    <!-- NEGOSIASI COL -->
                    <div class="min-w-[300px] w-[300px] bg-black/20 rounded-2xl p-4 border border-white/5 flex flex-col">
                        <h4 class="text-sm font-medium text-yellow-300 mb-4 flex items-center justify-between">
                            <span>Negosiasi</span>
                            <span id="count-nego" class="bg-white/10 text-xs px-2 py-0.5 rounded-full">0</span>
                        </h4>
                        <div id="list-nego" class="flex flex-col gap-3"></div>
                    </div>

                </div>
            </div>

        </main>
    </div>

    <script>
        const WEBHOOK_URL = 'https://n8n-mzbmiib3etk4.kangkung.sumopod.my.id/webhook/beuna-crm-api'; 
        let currentUser = null;

        // --- LOGIN LOGIC ---
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('loginError');

            btn.innerHTML = `<i class="ph ph-spinner animate-spin"></i> Authenticating...`;
            err.classList.add('hidden');

            try {
                // Tembak n8n
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ACTION: 'get_auth', username: u, password: p })
                });

                const res = await response.json();
                let userData = null;
                
                // Deteksi pintar: Cek apakah n8n membalas dengan Array atau Object langsung
                if (res.status === "success" && res.data) {
                    if (Array.isArray(res.data) && res.data.length > 0) {
                        userData = res.data[0]; // Kalau array, ambil data pertama
                    } else if (!Array.isArray(res.data) && res.data.USERNAME) {
                        userData = res.data; // Kalau object langsung
                    }
                }

                // Eksekusi Login
                if (userData) {
                    currentUser = userData; 
                    initDashboard();
                } else {
                    throw new Error('Data tidak cocok di n8n');
                }
                
            } catch (error) {
                console.error("Login Error:", error);
                btn.innerHTML = `<span>Sign In</span><i class="ph ph-arrow-right"></i>`;
                err.classList.remove('hidden');
                err.innerText = "Username/Password salah (Atau CORS n8n belum nyala)";
            }
        });

        // --- INIT DASHBOARD ---
        function initDashboard() {
            document.getElementById('loginScreen').classList.add('opacity-0', 'pointer-events-none');
            setTimeout(() => {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainDashboard').classList.remove('hidden');
            }, 500);

            document.getElementById('userFullName').innerText = currentUser.FULLNAME || currentUser.USERNAME;
            document.getElementById('userInitials').innerText = '@' + currentUser.USERNAME;
            
            const role = currentUser.ROLE ? currentUser.ROLE.toLowerCase() : 'team member';
            document.getElementById('userRoleBadge').innerText = role;

            if(role === 'project manager') {
                document.getElementById('userRoleBadge').classList.add('bg-indigo-500/20', 'px-2', 'py-0.5', 'rounded-md');
                document.getElementById('btnAssignTask').classList.remove('hidden');
                document.getElementById('btnAssignTask').classList.add('flex');
            } else {
                document.getElementById('userRoleBadge').classList.add('text-white/50');
            }

            // Langsung fetch data dari n8n!
            fetchTodos();
            fetchLeads();
        }

        // --- FETCH TO DO DARI N8N ---
        async function fetchTodos() {
            const container = document.getElementById('todoContainer');
            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ACTION: 'get_to_do_task' })
                });
                const res = await response.json();
                
                if (res.status === 'success' && res.data) {
                    // Normalize data (kalau n8n balikin object tunggal, jadiin array)
                    const dataArray = Array.isArray(res.data) ? res.data : [res.data];

                    if(dataArray.length === 0 || !dataArray[0].TASK_NAME) {
                        container.innerHTML = `<p class="text-sm text-white/40 italic">Yeay! No tasks found.</p>`;
                        return;
                    }
                    
                    container.innerHTML = dataArray.map(task => `
                        <div class="glass-panel p-4 rounded-xl flex items-center justify-between hover:bg-white/5 transition border border-white/10">
                            <div class="flex items-center gap-4">
                                <div class="w-2 h-10 ${task.STATUS === 'DONE' ? 'bg-green-500' : 'bg-indigo-500'} rounded-full"></div>
                                <div>
                                    <h4 class="font-medium text-sm">${task.TASK_NAME || 'Unnamed Task'}</h4>
                                    <p class="text-xs text-white/50">Project: ${task.PROJECT_ID || '-'} • Status: ${task.STATUS || 'To Do'}</p>
                                </div>
                            </div>
                            ${task.STATUS !== 'DONE' ? `
                            <button class="bg-white/10 hover:bg-white/20 border border-white/10 px-4 py-2 rounded-lg text-sm transition">
                                Mark as Done
                            </button>` : `<span class="text-green-400 text-sm flex items-center gap-1"><i class="ph-fill ph-check-circle"></i> Done</span>`}
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = `<p class="text-sm text-white/40 italic">No tasks available.</p>`;
                }
            } catch (error) {
                container.innerHTML = `<p class="text-sm text-red-400 italic">Error fetching tasks.</p>`;
            }
        }

        // --- FETCH LEADS DARI N8N ---
        async function fetchLeads() {
            const listNew = document.getElementById('list-new');
            const listPesan = document.getElementById('list-pesan');
            const listNego = document.getElementById('list-nego');
            
            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ACTION: 'get_leads' })
                });
                const res = await response.json();
                
                if (res.status === 'success' && res.data) {
                    listNew.innerHTML = ''; listPesan.innerHTML = ''; listNego.innerHTML = '';
                    let cNew = 0, cPesan = 0, cNego = 0;

                    // Normalize data (kalau n8n balikin object tunggal, jadiin array)
                    const dataArray = Array.isArray(res.data) ? res.data : [res.data];

                    dataArray.forEach(lead => {
                        // Skip if lead is empty object
                        if(!lead.NAMA_USAHA && !lead.NAMA_LEAD) return;

                        const stat = lead.STATUS || ''; // Jika kosong, anggap New
                        let waLink = '#';
                        if(lead.NOMOR_WA) {
                            // Bersihin spasi/strip trus jadiin format wa.me
                            waLink = `https://wa.me/${lead.NOMOR_WA.toString().replace(/[^0-9]/g, '')}`;
                        }

                        const card = `
                            <div class="glass-panel p-4 rounded-xl cursor-grab hover:bg-white/5 transition border border-white/10">
                                <h5 class="font-medium text-sm mb-1">${lead.NAMA_USAHA || lead.NAMA_LEAD || 'No Name'}</h5>
                                <p class="text-xs text-white/50 mb-3">${lead.INDUSTRI || '-'} • ${lead.DAERAH || '-'}</p>
                                <div class="flex gap-2">
                                    <a href="${waLink}" target="_blank" class="flex-1 bg-green-500/20 text-green-400 border border-green-500/30 py-1.5 rounded-lg text-xs flex justify-center items-center gap-1 hover:bg-green-500/30 transition">
                                        <i class="ph-fill ph-whatsapp-logo text-sm"></i> Chat
                                    </a>
                                    ${currentUser.ROLE === 'project manager' ? `
                                    <button class="w-8 h-8 bg-red-500/10 text-red-400 border border-red-500/20 rounded-lg flex justify-center items-center hover:bg-red-500/20 transition">
                                        <i class="ph ph-trash"></i>
                                    </button>` : ''}
                                </div>
                            </div>
                        `;

                        // Sorting logic ke kolom yg bener
                        if(stat === '' || stat.toLowerCase().includes('new')) {
                            listNew.innerHTML += card; cNew++;
                        } else if(stat.toLowerCase().includes('pesan')) {
                            listPesan.innerHTML += card; cPesan++;
                        } else if(stat.toLowerCase().includes('nego')) {
                            listNego.innerHTML += card; cNego++;
                        } else {
                            // Fallback ke New Lead
                            listNew.innerHTML += card; cNew++;
                        }
                    });

                    // Update Counter di Title Kolom
                    document.getElementById('count-new').innerText = cNew;
                    document.getElementById('count-pesan').innerText = cPesan;
                    document.getElementById('count-nego').innerText = cNego;
                }
            } catch (error) {
                listNew.innerHTML = `<p class="text-sm text-red-400 italic px-2">Failed to load leads.</p>`;
            }
        }

        // --- TAB SWITCHER ---
        function switchTab(tabName) {
            document.getElementById('tab-todo').classList.remove('active');
            document.getElementById('tab-leads').classList.remove('active');
            document.getElementById('view-todo').classList.add('hidden');
            document.getElementById('view-leads').classList.add('hidden');

            document.getElementById(`tab-${tabName}`).classList.add('active');
            document.getElementById(`view-${tabName}`).classList.remove('hidden');
            document.getElementById(`view-${tabName}`).classList.add('block');
        }

        // --- LOGOUT ---
        function logout() {
            currentUser = null;
            document.getElementById('mainDashboard').classList.add('hidden');
            document.getElementById('loginScreen').classList.remove('hidden', 'opacity-0', 'pointer-events-none');
            document.getElementById('loginForm').reset();
            document.getElementById('loginBtn').innerHTML = `<span>Sign In</span><i class="ph ph-arrow-right"></i>`;
        }
    </script>
</body>
</html>
