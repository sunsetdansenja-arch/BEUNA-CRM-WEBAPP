<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beuna OS - Login</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/sunsetdansenja-arch/beuna-agency/main/beuna%20logo%20v2.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; }
        .glass-panel { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="antialiased flex items-center justify-center">

    <div class="glass-panel p-10 w-full max-w-sm flex flex-col items-center rounded-3xl relative shadow-2xl">
        <img src="https://raw.githubusercontent.com/sunsetdansenja-arch/beuna-agency/main/beuna%20logo%20v2.png" alt="Beuna Logo" class="w-16 h-16 mb-4">
        <h1 class="text-2xl font-extrabold mb-1 tracking-tight text-gray-900">Beuna OS</h1>
        <p class="text-xs text-gray-500 mb-8 text-center uppercase tracking-widest">Managerial Gateway</p>
        
        <form id="loginForm" class="w-full space-y-4" onsubmit="handleLogin(event)">
            <input type="text" id="username" placeholder="Username (admin / budi)" class="w-full bg-white border border-gray-200 rounded-xl px-5 py-4 text-sm focus:outline-none focus:border-indigo-600 transition-all" required>
            <input type="password" id="password" placeholder="Password (123)" class="w-full bg-white border border-gray-200 rounded-xl px-5 py-4 text-sm focus:outline-none focus:border-indigo-600 transition-all" required>
            <button type="submit" class="w-full bg-gray-900 text-white font-bold rounded-xl py-4 text-sm hover:bg-black transition-all shadow-lg active:scale-95">Login to HQ</button>
        </form>
    </div>

    <script>
        // Init Mock Database if empty
        if(!localStorage.getItem('beunaLeads')) {
            const initialLeads = [
                { id: "L1", name: "PT Sejahtera (Supply Chain)", status: "new", lastContact: "Today", reason: "", phone: "6281234567890", followupDate: "", pic: null },
                { id: "L2", name: "Klinik ABC (WA Bot)", status: "reached", lastContact: "Yesterday", reason: "", phone: "6289876543210", followupDate: "", pic: "Dimas Santosa" },
                { id: "L5", name: "Laundry Fortuna", status: "won", lastContact: "Ongoing", reason: "", phone: "628777888999", followupDate: "", pic: "Dimas Santosa" }
            ];
            localStorage.setItem('beunaLeads', JSON.stringify(initialLeads));
        }

        const users = { 
            'admin': { id: 'admin', name: 'Dimas Santosa', role: 'System Architect / Owner', initials: 'DS' },
            'budi': { id: 'budi', name: 'Budi (Sales)', role: 'Account Executive', initials: 'BD' } 
        };

        // Session Check
        window.onload = () => {
            if(localStorage.getItem('beunaSession')) window.location.href = 'crm.html';
        };

        function handleLogin(e) {
            e.preventDefault();
            const u = document.getElementById('username').value.toLowerCase();
            const p = document.getElementById('password').value;
            if(users[u] && p === '123') {
                localStorage.setItem('beunaSession', JSON.stringify(users[u]));
                window.location.href = 'crm.html';
            } else { alert("Kredensial salah! Gunakan admin/123 atau budi/123"); }
        }
    </script>
</body>
</html>
